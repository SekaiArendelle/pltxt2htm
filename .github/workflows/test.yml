name: Tests

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"

jobs:
  x86_64-windows-msvc-test:
    name: x86_64-windows-msvc (tests/)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Clang
        uses: egor-tensin/setup-clang@v1
        with:
          version: latest
          platform: x64

      - name: clang version
        shell: powershell
        run: |
          clang -v

      - name: Configure and build
        shell: powershell
        run: |
          cmake -S tests -B tests/build -GNinja -DCMAKE_BUILD_TYPE=Debug -DPLTXT2HTM_ENABLE_STACKTRACE=ON -DCMAKE_CXX_COMPILER=clang++
          cmake --build tests/build -v
          ctest --test-dir tests/build -V -j $env:NUMBER_OF_PROCESSORS

  aarch64-apple-darwin24-test-asan:
    name: aarch64-apple-darwin24 (tests/, asan)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install clang and ninja
        run: |
          brew update
          brew install llvm lld ninja

      - name: Set PATH for LLVM clang
        run: echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH

      - name: Configure and build
        run: |
          cmake -S tests -B tests/build -GNinja -DCMAKE_BUILD_TYPE=Debug -DPLTXT2HTM_SANITIZER=address -DCMAKE_CXX_COMPILER=clang++
          cmake --build tests/build -v
          ctest --test-dir tests/build -V -j $(sysctl -n hw.ncpu)

  aarch64-apple-darwin24-test-ubsan:
    name: aarch64-apple-darwin24 (tests/, ubsan)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install clang and ninja
        run: |
          brew update
          brew install llvm lld ninja

      - name: Set PATH for LLVM clang
        run: echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH

      - name: Configure and build
        env:
          UBSAN_OPTIONS: "halt_on_error=1:abort_on_error=1:print_stacktrace=1"
        run: |
          cmake -S tests -B tests/build -GNinja -DCMAKE_BUILD_TYPE=Debug -DPLTXT2HTM_SANITIZER=undefined -DCMAKE_CXX_COMPILER=clang++
          cmake --build tests/build -v
          ctest --test-dir tests/build -V -j $(sysctl -n hw.ncpu)

  x86_64-linux-gnu-test-asan:
    strategy:
      fail-fast: false

    name: x86_64-linux-gnu (tests/, asan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image (tests run during build)
        run: |
          docker build -f tests/docker/x86_64-linux-gnu-asan/Dockerfile -t x86_64-linux-gnu-test-asan .

  x86_64-linux-gnu-test-msan:
    strategy:
      fail-fast: false

    name: x86_64-linux-gnu (tests/, msan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image (tests run during build)
        run: |
          docker build -f tests/docker/x86_64-linux-gnu-msan/Dockerfile -t x86_64-linux-gnu-test-msan .

  x86_64-windows-msvc-cmd:
    strategy:
      fail-fast: false
      matrix:
        build-mode: [release]

    name: x86_64-windows-msvc (cmd/, ${{ matrix.build-mode }} mode)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build -f cmd/docker/x86_64-windows-msvc/Dockerfile \
            --build-arg mode=${{ matrix.build-mode }} \
            -t x86_64-windows-msvc-pltxt2htm-cmd-${{ matrix.build-mode }} .

      - name: Verify archive
        run: |
          docker run --rm \
            x86_64-windows-msvc-pltxt2htm-cmd-${{ matrix.build-mode }} \
            ls -la /pltxt2htm/cmd/x86_64-windows-msvc-pltxt2htm-cmd-${{ matrix.build-mode }}.zip

  aarch64-apple-darwin24-cmd:
    strategy:
      fail-fast: false
      matrix:
        build-mode: [debug]

    name: aarch64-apple-darwin24 (cmd/, ${{ matrix.build-mode }} mode)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build -f cmd/docker/aarch64-apple-darwin24/Dockerfile \
            --build-arg mode=${{ matrix.build-mode }} \
            -t aarch64-apple-darwin24-pltxt2htm-cmd-${{ matrix.build-mode }} .

      - name: Verify archive
        run: |
          docker run --rm \
            aarch64-apple-darwin24-pltxt2htm-cmd-${{ matrix.build-mode }} \
            ls -la /pltxt2htm/cmd/aarch64-apple-darwin24-pltxt2htm-cmd-${{ matrix.build-mode }}.tar.xz

  aarch64-apple-darwin24-examples:
    strategy:
      fail-fast: false
      matrix:
        build-mode: [debug]

    name: aarch64-apple-darwin24 (examples/, ${{ matrix.build-mode }} mode)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install clang and xmake
        run: |
          brew update
          brew install llvm lld xmake

      - name: Set PATH for LLVM clang
        run: echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH

      - name: Verify clang installation
        run: |
          clang -v

      - name: Configure and build
        working-directory: examples
        run: |
          xmake f -m ${{ matrix.build-mode }} --toolchain=clang
          xmake build -v

  wasm32-unknown-emscripten-wasm:
    strategy:
      fail-fast: false
      matrix:
        build-mode: [debug, release]

    name: wasm32-unknown-emscripten (wasm/, ${{ matrix.build-mode }} mode)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build -f wasm/docker/wasm32-unknown-emscripten/Dockerfile --build-arg mode=${{ matrix.build-mode }} -t wasm32-unknown-emscripten-pltxt2htm-wasm-${{ matrix.build-mode }} .

  aarch64-apple-darwin24-py-release:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14.5"]

    name: aarch64-apple-darwin24 (py/, release mode, python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build -f py/docker/aarch64-apple-darwin24/Dockerfile \
            --build-arg PYTHON_VERSION=${{ matrix.python-version }} \
            -t aarch64-apple-darwin24-pltxt2htm-py-cpython${{ matrix.python-version }}-release \
            .

      - name: Verify .so file
        run: |
          tag="aarch64-apple-darwin24-pltxt2htm-py-cpython${{ matrix.python-version }}-release"
          docker run --rm "${tag}" cat "/pltxt2htm/py/aarch64-apple-darwin24-pltxt2htm-py-cpython${{ matrix.python-version }}-release.tar.xz" \
            > /tmp/py-output.tar.xz
          tar -xJf /tmp/py-output.tar.xz -C /tmp
          dir="/tmp/aarch64-apple-darwin24-pltxt2htm-py-cpython${{ matrix.python-version }}-release"
          minor=$(echo "${{ matrix.python-version }}" | cut -d. -f1,2)
          short=$(echo "${minor}" | tr -d '.')
          file="${dir}/pltxt2htm.cpython-${short}-darwin.so"
          if [ ! -f "${file}" ]; then
            echo "ERROR: .so file not found"
            exit 1
          fi
          magic=$(python3 -c "with open('${file}','rb') as f: print(f.read(4).hex())")
          if [ "${magic}" = "cffaedfe" ]; then
            echo "OK: valid MH_MAGIC_64"
          else
            echo "ERROR: bad magic ${magic}"
            exit 1
          fi

  x86_64-windows-msvc-py-release:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12.10"]

    name: x86_64-windows-msvc (py/, release mode, python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build -f py/docker/x86_64-windows-msvc/Dockerfile \
            --build-arg PYTHON_VERSION=${{ matrix.python-version }} \
            -t x86_64-windows-msvc-pltxt2htm-py-cpython${{ matrix.python-version }}-release \
            .

      - name: Verify archive
        run: |
          full="${{ matrix.python-version }}"
          tag="x86_64-windows-msvc-pltxt2htm-py-cpython${full}-release"
          docker run --rm "${tag}" cat "/pltxt2htm/py/x86_64-windows-msvc-pltxt2htm-py-cpython${full}-release.zip" \
            > /tmp/py-output.zip
          file_size=$(stat -c%s /tmp/py-output.zip 2>/dev/null || stat -f%z /tmp/py-output.zip)
          if [ "${file_size}" -le 1000 ]; then
            echo "ERROR: archive too small (${file_size} bytes)"
            exit 1
          fi
          echo "OK: archive size ${file_size} bytes"

  armv7-linux-androideabi30-c-release:
    name: armv7-linux-androideabi30 (c/, release mode)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build -f c/docker/armv7-linux-androideabi30/Dockerfile -t armv7-linux-androideabi30-pltxt2htm-c-release .

  aarch64-linux-android30-c-release:
    name: aarch64-linux-android30 (c/, release mode)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build -f c/docker/aarch64-linux-android30/Dockerfile -t aarch64-linux-android30-pltxt2htm-c-release .

  x86_64-windows-msvc-c-release:
    name: x86_64-windows-msvc (c/, release mode)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build -f c/docker/x86_64-windows-msvc/Dockerfile --build-arg mode=release -t x86_64-windows-msvc-pltxt2htm-c-debug .

  aarch64-apple-ios-c-release:
    name: aarch64-apple-ios (c/, release mode)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install clang and xmake
        run: |
          brew update
          brew install llvm lld xmake

      - name: Set PATH for LLVM clang
        run: echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH

      - name: Configure and build
        working-directory: c
        run: |
          xmake config -m release -k static --toolchain=clang --cxxflags="--target=aarch64-apple-ios -isysroot $(xcrun --sdk iphoneos --show-sdk-path)"
          xmake build -v

  x86_64-linux-gnu-cxxmodule:
    name: x86_64-linux-gnu (cxxmodule/)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build -f cxxmodule/docker/x86_64-linux-gnu/Dockerfile -t pltxt2htm-cxxmodule .
