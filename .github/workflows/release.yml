name: release

on:
  release:
    types: [published]

jobs:
  x86_64-windows-msvc-cmd:
    strategy:
      fail-fast: false
      matrix:
        build-mode: [debug, release]

    name: x86_64-windows-msvc (cmd/, ${{ matrix.build-mode }} mode)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build -f cmd/docker/x86_64-windows-msvc/Dockerfile \
            --build-arg mode=${{ matrix.build-mode }} \
            -t x86_64-windows-msvc-pltxt2htm-cmd-${{ matrix.build-mode }} .

      - name: Copy archive from container
        working-directory: cmd
        run: |
          docker run -d --name x86_64-windows-msvc-pltxt2htm-cmd-${{ matrix.build-mode }} \
            x86_64-windows-msvc-pltxt2htm-cmd-${{ matrix.build-mode }}
          docker cp x86_64-windows-msvc-pltxt2htm-cmd-${{ matrix.build-mode }}:/pltxt2htm/cmd/x86_64-windows-msvc-pltxt2htm-cmd-${{ matrix.build-mode }}.zip .

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: cmd/x86_64-windows-msvc-pltxt2htm-cmd-${{ matrix.build-mode }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  aarch64-apple-darwin24-cmd:
