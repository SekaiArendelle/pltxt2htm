  aarch64-apple-ios-c-release:
    name: aarch64-apple-ios (c/, release mode)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install clang and cmake
        run: |
          brew update
          brew install llvm lld cmake ninja

      - name: Set PATH for LLVM clang
        run: echo "/opt/homebrew/opt/llvm/bin" >> $GITHUB_PATH

      - name: Configure and build
        working-directory: c
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_CXX_FLAGS="--target=aarch64-apple-ios -isysroot $(xcrun --sdk iphoneos --show-sdk-path)"
          cmake --build build -v

      - name: Install and package
        working-directory: c
        run: |
          cmake --install build --prefix aarch64-apple-ios-pltxt2htm-c-release
          tar cJf aarch64-apple-ios-pltxt2htm-c-release.tar.xz aarch64-apple-ios-pltxt2htm-c-release

      - name: Upload binary
        uses: softprops/action-gh-release@v2
        with:
          files: c/aarch64-apple-ios-pltxt2htm-c-release.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docsgen:
    name: docsgen
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build docker image
        run: |
          docker build -f docsgen/Dockerfile -t pltxt2htm-docs .

      - name: Package generated docs
        run: |
          docker create --name pltxt2htm-docs-container pltxt2htm-docs
          docker cp pltxt2htm-docs-container:/src/docsgen/docs ./pltxt2htm-docs
          tar -cJvf pltxt2htm-docs.tar.xz pltxt2htm-docs

      - name: Upload docs
        uses: softprops/action-gh-release@v2
        with:
          files: pltxt2htm-docs.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
