          docker run --rm armv7-linux-androideabi30-pltxt2htm-c-release cat /pltxt2htm/c/armv7-linux-androideabi30-pltxt2htm-c-release.tar.xz > armv7-linux-androideabi30-pltxt2htm-c-release.tar.xz

