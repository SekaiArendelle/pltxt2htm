[workspace]
name = "pltxt2htm"
version = "0.19.0"
description = "Parse Quantum-Physics text to HTML"
authors = ["Arendelle <Arendelle_@outlook.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[tasks]
configure = "cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release"
build = { cmd = "cmake --build build", depends-on = ["configure"] }

[dependencies]
cmake = "*"
cxx-compiler = "*"
ninja = "*"

[feature.py310]
dependencies = { python = ">=3.10,<3.11" }

[feature.py311]
dependencies = { python = ">=3.11,<3.12" }

[feature.py312]
dependencies = { python = ">=3.12,<3.13" }

[feature.py313]
dependencies = { python = ">=3.13,<3.14" }

[environments]
default = ["py312"]
py310 = ["py310"]
py311 = ["py311"]
py312 = ["py312"]
py313 = ["py313"]
