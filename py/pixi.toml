[workspace]
name = "pltxt2htm"
version = "0.21.0"  # Generated by gen_version.py, do not edit
description = "Parse Quantum-Physics text to HTML"
authors = ["Arendelle <Arendelle_@outlook.com>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[tasks]
configure = "cmake -B build -S . -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++"
build = { cmd = "cmake --build build", depends-on = ["configure"] }

[dependencies]
cmake = "*"
clangxx = "*"
ninja = "*"

[feature.py39]
dependencies = { python = ">=3.9,<3.10" }

[feature.py310]
dependencies = { python = ">=3.10,<3.11" }

[feature.py311]
dependencies = { python = ">=3.11,<3.12" }

[feature.py312]
dependencies = { python = ">=3.12,<3.13" }

[feature.py313]
dependencies = { python = ">=3.13,<3.14" }

[feature.py314]
dependencies = { python = ">=3.14,<3.15" }

[environments]
default = ["py312"]
py39 = ["py39"]
py310 = ["py310"]
py311 = ["py311"]
py312 = ["py312"]
py313 = ["py313"]
py314 = ["py314"]
