[workspace]
name = "pltxt2htm-csharp-translator"
version = "0.1.0"
description = "Translate include/pltxt2htm C++ APIs to C# with clang/LLVM C++ API"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[tasks.configure]
cmd = "cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++"

[tasks.build]
cmd = "cmake --build build --parallel"
depends-on = ["configure"]

[tasks.install]
cmd = "cmake --install build --prefix ."
depends-on = ["build"]

[dependencies]
cmake = ">=3.28,<4"
ninja = ">=1.11,<2"
clang = "21.*"
clangxx = "21.*"
clangdev = "21.*"
llvmdev = "21.*"
zlib = ">=1.3,<2"
libxml2 = ">=2.13,<3"
libxml2-devel = ">=2.13,<3"
