[project]
name = "pltxt2htm-csharp-translator"
version = "0.1.0"
description = "Translate include/pltxt2htm C++ APIs to C#"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "win-64"]

[tasks]
configure = "cmake -S . -B build -G Ninja"
build = "cmake --build build"
translate = "python src/translate.py --header ../../include/pltxt2htm/pltxt2htm.hh --output generated/Pltxt2htm.Generated.cs"

[dependencies]
python = ">=3.12,<3.14"
clangdev = ">=19"
cmake = ">=3.29"
ninja = ">=1.12"
